
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Night Sky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #c8d0d8;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  #hud > * { pointer-events: auto; }

  .hud-left, .hud-right {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hud-right { align-items: flex-end; }

  .hud-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6a9bd1;
    font-family: 'JetBrains Mono', monospace;
  }

  .hud-label {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    color: #556270;
    font-family: 'JetBrains Mono', monospace;
  }

  .hud-value {
    color: #8a9bae;
  }

  #tooltip {
    position: absolute;
    display: none;
    background: rgba(8, 12, 20, 0.92);
    border: 1px solid rgba(100, 140, 200, 0.25);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(8px);
    max-width: 220px;
  }

  .tip-name {
    color: #9dc0eb;
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .tip-detail {
    color: #5a6a7a;
    font-size: 10px;
    line-height: 1.5;
  }

  #controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    width: max-content;
    max-width: calc(100vw - 24px);
  }

  .ctrl-btn {
    background: rgba(20, 28, 40, 0.85);
    border: 1px solid rgba(100, 140, 200, 0.2);
    color: #7a8a9a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  .ctrl-btn:hover { border-color: rgba(100, 160, 220, 0.5); color: #a0b8d0; }
  .ctrl-btn.active { border-color: rgba(100, 160, 220, 0.6); color: #9dc0eb; background: rgba(30, 50, 80, 0.6); }

  .mag-slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(20, 28, 40, 0.85);
    border: 1px solid rgba(100, 140, 200, 0.2);
    border-radius: 4px;
    padding: 6px 12px;
    backdrop-filter: blur(8px);
  }

  .mag-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: #7a8a9a;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .mag-label span { color: #9dc0eb; }

  #mag-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 3px;
    background: rgba(60, 100, 160, 0.3);
    border-radius: 2px;
    outline: none;
  }


  @media (max-width: 540px) {
    #controls {
      bottom: 10px;
      gap: 6px;
    }
    .ctrl-btn {
      font-size: 9px;
      padding: 7px 10px;
      letter-spacing: 0.5px;
    }
    .mag-slider-wrap {
      padding: 5px 10px;
    }
    .mag-label {
      font-size: 9px;
      letter-spacing: 0.5px;
    }
    #mag-slider {
      width: 80px;
    }
  }

  #mag-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6a9bd1;
    cursor: pointer;
    border: 1px solid rgba(100, 160, 220, 0.5);
  }

  #mag-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6a9bd1;
    cursor: pointer;
    border: 1px solid rgba(100, 160, 220, 0.5);
  }


  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #4a5a6a;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 100;
  }

  #location-prompt {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 100;
    display: none;
  }

  #location-prompt .prompt-title {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 3px;
    color: #6a9bd1;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  #location-prompt input {
    background: rgba(20, 28, 40, 0.9);
    border: 1px solid rgba(100, 140, 200, 0.3);
    color: #a0b8d0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 4px;
    width: 120px;
    text-align: center;
    margin: 0 4px;
    outline: none;
  }

  #location-prompt input:focus { border-color: rgba(100, 160, 220, 0.6); }

  #location-prompt button {
    display: block;
    margin: 16px auto 0;
    background: rgba(40, 70, 110, 0.7);
    border: 1px solid rgba(100, 160, 220, 0.4);
    color: #9dc0eb;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
  }

  .prompt-or {
    color: #3a4a5a;
    font-size: 11px;
    margin: 12px 0;
    letter-spacing: 2px;
  }

  .prompt-geo {
    color: #5a7a9a;
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .prompt-geo:hover { color: #8ab0d8; }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div id="hud">
  <div class="hud-left">
    <div class="hud-title">Night Sky</div>
    <div class="hud-label" id="hud-location"></div>
    <div class="hud-label" id="hud-time"></div>
  </div>
  <div class="hud-right">
    <div class="hud-label" id="hud-az"></div>
    <div class="hud-label" id="hud-fov"></div>
  </div>
</div>

<div id="tooltip">
  <div class="tip-name" id="tip-name"></div>
  <div class="tip-detail" id="tip-detail"></div>
</div>

<div id="controls">
  <button class="ctrl-btn active" id="btn-lines" onclick="toggleLines()">Lines</button>
  <button class="ctrl-btn active" id="btn-names" onclick="toggleNames()">Names</button>
  <button class="ctrl-btn" id="btn-connames" onclick="toggleConNames()">Constellations</button>
  <button class="ctrl-btn active" id="btn-planets" onclick="togglePlanets()">Planets</button>
  <button class="ctrl-btn active" id="btn-milkyway" onclick="toggleMilkyWay()">Milky Way</button>
  <button class="ctrl-btn" id="btn-temp" onclick="toggleTemp()">Temp</button>
  <div class="mag-slider-wrap">
    <label class="mag-label" for="mag-slider">Mag ≤ <span id="mag-value">5.0</span></label>
    <input type="range" id="mag-slider" min="-1.5" max="5.0" step="0.1" value="5.0" oninput="onMagSlider(this.value)">
  </div>
</div>

<div id="loading">Initializing...</div>

<div id="location-prompt">
  <div class="prompt-title">Set Your Location</div>
  <div>
    <input type="text" id="inp-lat" placeholder="Lat" value="42.96">
    <input type="text" id="inp-lon" placeholder="Lon" value="-85.66">
  </div>
  <div class="prompt-or">— or —</div>
  <div class="prompt-geo" onclick="useGeolocation()">Use device GPS</div>
  <button onclick="applyManualLocation()">View Sky</button>
</div>

function computePlanetRA_Dec(planet, jd) {
  const T = (jd - 2451545.0) / 36525.0;
  const a = planet.a + planet.da * T;
  const e = planet.e + planet.de * T;
  const I = (planet.I + planet.dI * T) * Math.PI / 180;
  const L = (planet.L + planet.dL * T) % 360;
  const wbar = (planet.wbar + planet.dwbar * T) % 360;
  const Om = (planet.Om + planet.dOm * T) % 360;
  const w = (wbar - Om) * Math.PI / 180;
  const M = ((L - wbar) % 360 + 360) % 360 * Math.PI / 180;

  // Solve Kepler's equation
  let E = M;
  for (let i = 0; i < 20; i++) {
    E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }

  const xp = a * (Math.cos(E) - e);
  const yp = a * Math.sqrt(1 - e * e) * Math.sin(E);

  const cosW = Math.cos(w), sinW = Math.sin(w);
  const cosOm = Math.cos(Om * Math.PI / 180), sinOm = Math.sin(Om * Math.PI / 180);
  const cosI = Math.cos(I), sinI = Math.sin(I);

  const x = (cosW * cosOm - sinW * sinOm * cosI) * xp + (-sinW * cosOm - cosW * sinOm * cosI) * yp;
  const y = (cosW * sinOm + sinW * cosOm * cosI) * xp + (-sinW * sinOm + cosW * cosOm * cosI) * yp;
  const z = (sinW * sinI) * xp + (cosW * sinI) * yp;

  return { x, y, z };
}

function getPlanetPositions(date) {
  const jd = dateToJD(date);
  const T = (jd - 2451545.0) / 36525.0;

  // Earth position
  const earth = {
    a: 1.000002, e: 0.016709 - 0.00004204 * T,
    I: -0.00005, L: 100.4664 + 35999.3729 * T,
    wbar: 102.9373 + 0.32327 * T, Om: 0,
    da: 0, de: 0, dI: 0, dL: 0, dwbar: 0, dOm: 0
  };

  const earthPos = computePlanetRA_Dec(earth, jd);
  const results = [];

  for (const p of PLANETS) {
    const pos = computePlanetRA_Dec(p, jd);
    // Geocentric ecliptic
    const dx = pos.x - earthPos.x;
    const dy = pos.y - earthPos.y;
    const dz = pos.z - earthPos.z;

    // Ecliptic to equatorial (obliquity ~23.439 deg)
    const eps = 23.4393 * Math.PI / 180;
    const xeq = dx;
    const yeq = dy * Math.cos(eps) - dz * Math.sin(eps);
    const zeq = dy * Math.sin(eps) + dz * Math.cos(eps);

    const ra = ((Math.atan2(yeq, xeq) * 180 / Math.PI) + 360) % 360 / 15; // hours
    const dec = Math.atan2(zeq, Math.sqrt(xeq * xeq + yeq * yeq)) * 180 / Math.PI;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

    results.push({ name: p.name, symbol: p.symbol, color: p.color, ra, dec, dist });
  }

  // Moon (very simplified)
  const D = jd - 2451545.0;
  const moonL = (218.316 + 13.176396 * D) % 360 * Math.PI / 180;
  const moonM = (134.963 + 13.064993 * D) % 360 * Math.PI / 180;
  const moonF = (93.272 + 13.229350 * D) % 360 * Math.PI / 180;
  const moonLon = moonL + 6.289 * Math.PI / 180 * Math.sin(moonM);
  const moonLat = 5.128 * Math.PI / 180 * Math.sin(moonF);

  const eps2 = 23.4393 * Math.PI / 180;
  const moonX = Math.cos(moonLat) * Math.cos(moonLon);
  const moonY = Math.cos(eps2) * Math.cos(moonLat) * Math.sin(moonLon) - Math.sin(eps2) * Math.sin(moonLat);
  const moonZ = Math.sin(eps2) * Math.cos(moonLat) * Math.sin(moonLon) + Math.cos(eps2) * Math.sin(moonLat);

  const moonRa = ((Math.atan2(moonY, moonX) * 180 / Math.PI) + 360) % 360 / 15;
  const moonDec = Math.atan2(moonZ, Math.sqrt(moonX * moonX + moonY * moonY)) * 180 / Math.PI;

  results.push({ name: "Moon", symbol: "☽", color: "#e8e4d8", ra: moonRa, dec: moonDec, dist: 0.00257 });

  return results;
}

const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

function dateToJD(date) {
  const y = date.getUTCFullYear();
  const m = date.getUTCMonth() + 1;
  const d = date.getUTCDate() + date.getUTCHours() / 24 + date.getUTCMinutes() / 1440 + date.getUTCSeconds() / 86400;
  let yy = y, mm = m;
  if (mm <= 2) { yy--; mm += 12; }
  const A = Math.floor(yy / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (yy + 4716)) + Math.floor(30.6001 * (mm + 1)) + d + B - 1524.5;
}

function gmst(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  let s = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000.0;
  return ((s % 360) + 360) % 360;
}

function raDecToAltAz(ra, dec, lat, lon, lst) {
  const ha = (lst - ra * 15 + 360) % 360 * DEG;
  const decR = dec * DEG;
  const latR = lat * DEG;

  const sinAlt = Math.sin(decR) * Math.sin(latR) + Math.cos(decR) * Math.cos(latR) * Math.cos(ha);
  const alt = Math.asin(sinAlt);

  const cosAz = (Math.sin(decR) - Math.sin(alt) * Math.sin(latR)) / (Math.cos(alt) * Math.cos(latR));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz)));
  if (Math.sin(ha) > 0) az = 2 * Math.PI - az;

  return { alt: alt * RAD, az: az * RAD };
}

function galacticToRaDec(lDeg, bDeg = 0) {
  const raNGP = 192.85948 * DEG;
  const decNGP = 27.12825 * DEG;
  const lOmega = 32.93192 * DEG;
  const l = lDeg * DEG;
  const b = bDeg * DEG;

  const sinDec = Math.sin(b) * Math.sin(decNGP) + Math.cos(b) * Math.cos(decNGP) * Math.sin(l - lOmega);
  const dec = Math.asin(Math.max(-1, Math.min(1, sinDec)));

  const y = Math.cos(b) * Math.cos(l - lOmega);
  const x = Math.sin(b) * Math.cos(decNGP) - Math.cos(b) * Math.sin(decNGP) * Math.sin(l - lOmega);
  const ra = (Math.atan2(y, x) + raNGP + Math.PI * 2) % (Math.PI * 2);

  return { ra: ra * RAD / 15, dec: dec * RAD };
}

function hash01(x) {
  const s = Math.sin(x * 12.9898 + 78.233) * 43758.5453123;
  return s - Math.floor(s);
}

function galacticCoreDistance(lDeg) {
  const a = ((lDeg % 360) + 360) % 360;
  return Math.min(a, 360 - a);
}

function seededRand(seedObj) {
  seedObj.v = (1664525 * seedObj.v + 1013904223) >>> 0;
  return seedObj.v / 4294967296;
}

// Stereographic projection (zenith-centered)
function project(alt, az, centerAz, centerAlt, fov, cx, cy, radius) {
  // Convert to direction vectors
  const a1 = az * DEG, e1 = alt * DEG;
  const a0 = centerAz * DEG, e0 = centerAlt * DEG;

  const x1 = Math.cos(e1) * Math.sin(a1);
  const y1 = Math.cos(e1) * Math.cos(a1);
  const z1 = Math.sin(e1);

  // Rotate so center is at pole
  const cosA = Math.cos(-a0), sinA = Math.sin(-a0);
  const rx = x1 * cosA - y1 * sinA;
  const ry = x1 * sinA + y1 * cosA;
  const rz = z1;

  const cosE = Math.cos(Math.PI / 2 - e0), sinE = Math.sin(Math.PI / 2 - e0);
  const fx = rx;
  const fy = ry * cosE - rz * sinE;
  const fz = ry * sinE + rz * cosE;

  if (fz < -0.01) return null; // behind us

  const scale = radius / Math.tan(fov * DEG / 2);
  const d = 1.0 + fz;
  if (d < 0.001) return null;

  const sx = cx + (fx / d) * scale;
  const sy = cy + (fy / d) * scale;

  return { x: sx, y: sy };
}

// ═══════════════════════════════════════════
// COLOR FROM B-V INDEX
// ═══════════════════════════════════════════
function bvToRGB(bv) {
  let r, g, b;
  const t = Math.max(-0.4, Math.min(2.0, bv));

  if (t < 0) {
    r = 0.61 + 0.39 * (t + 0.4) / 0.4;
    g = 0.70 + 0.30 * (t + 0.4) / 0.4;
    b = 1.0;
  } else if (t < 0.15) {
    r = 0.83 + 0.17 * t / 0.15;
    g = 0.87 + 0.13 * t / 0.15;
    b = 1.0;
  } else if (t < 0.4) {
    r = 1.0;
    g = 1.0 - 0.08 * (t - 0.15) / 0.25;
    b = 1.0 - 0.15 * (t - 0.15) / 0.25;
  } else if (t < 0.8) {
    r = 1.0;
    g = 0.92 - 0.17 * (t - 0.4) / 0.4;
    b = 0.85 - 0.25 * (t - 0.4) / 0.4;
  } else {
    r = 1.0;
    g = 0.75 - 0.15 * Math.min(1, (t - 0.8) / 1.2);
    b = 0.60 - 0.20 * Math.min(1, (t - 0.8) / 1.2);
  }

  return `rgb(${Math.round(r * 255)},${Math.round(g * 255)},${Math.round(b * 255)})`;
}

// ═══════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════
let canvas, ctx;
let W, H;
let lat = 42.96, lon = -85.66; // Grand Rapids default
let centerAz = 0, centerAlt = 45;
let fov = (window.innerWidth <= 540 && window.innerHeight > window.innerWidth) ? 40 : 60;
let showLines = true, showLabels = true, showConNames = false, showPlanets = true, showGrid = true, showTemp = false, showMilkyWay = true;
let magLimit = 5.0;
let isDragging = false, lastMX = 0, lastMY = 0;
let mouseX = 0, mouseY = 0;
let locationSet = false;
let animFrame;
let milkyWayCanvas = null;
let milkyWayCtx = null;
let milkyStarsCanvas = null;
let milkyStarsCtx = null;
let milkyWayCacheKey = '';
let milkyMicroStars = null;

const MILKYWAY_TUNING = {
  baseArcWidth: 90,
  baseBlur: 200,
  baseOpacity: 0.17,
  cloudStrength: 20.0,
  dustStrength: 10.0,
  microStarDensity: 3.0
};

// Precomputed star screen positions for hit testing
let starScreenPos = [];
let planetScreenPos = [];

function init() {
  canvas = document.getElementById('sky');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Mouse/touch
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);

  // Try geolocation automatically
  document.getElementById('loading').style.display = 'none';

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        locationSet = true;
        startRendering();
      },
      () => {
        document.getElementById('location-prompt').style.display = 'block';
      },
      { timeout: 5000 }
    );
  } else {
    document.getElementById('location-prompt').style.display = 'block';
  }
}

function useGeolocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    locationSet = true;
    document.getElementById('location-prompt').style.display = 'none';
    startRendering();
  }, () => {
    alert('Geolocation failed. Please enter coordinates manually.');
  });
}

function applyManualLocation() {
  lat = parseFloat(document.getElementById('inp-lat').value) || 42.96;
  lon = parseFloat(document.getElementById('inp-lon').value) || -85.66;
  locationSet = true;
  document.getElementById('location-prompt').style.display = 'none';
  startRendering();
}

function startRendering() {
  render();
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  milkyWayCacheKey = '';
  if (locationSet) render();
}

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
function render() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(doRender);
}

function doRender() {
  const now = new Date();
  const jd = dateToJD(now);
  const lst = (gmst(jd) + lon) % 360;

  ctx.fillStyle = '#05080e';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const radius = Math.min(W, H) * 0.42;

  // Draw subtle atmosphere gradient
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.3);
  grad.addColorStop(0, 'rgba(8, 16, 32, 0)');
  grad.addColorStop(0.8, 'rgba(8, 16, 32, 0)');
  grad.addColorStop(1, 'rgba(15, 25, 40, 0.3)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (showMilkyWay) drawMilkyWayLayer(lst, cx, cy, radius);

  // Horizon circle
  drawHorizon(cx, cy, radius, lst);

  // Grid
  if (showGrid) drawGrid(cx, cy, radius, lst);

  // Constellation lines
  starScreenPos = [];
  const starAltAz = STARS.map(s => raDecToAltAz(s.ra, s.dec, lat, lon, lst));

  if (showLines) {
    ctx.strokeStyle = 'rgba(80, 120, 180, 0.4)';
    ctx.lineWidth = 1.2;
    for (const con in CONSTELLATIONS) {
      let sumX = 0, sumY = 0, count = 0;
      for (const seg of CONSTELLATIONS[con]) {
        const aa1 = starAltAz[seg[0]];
        const aa2 = starAltAz[seg[1]];
        if (aa1.alt < -2 && aa2.alt < -2) continue;
        if (STARS[seg[0]].mag > magLimit || STARS[seg[1]].mag > magLimit) continue;
        const p1 = project(aa1.alt, aa1.az, centerAz, centerAlt, fov, cx, cy, radius);
        const p2 = project(aa2.alt, aa2.az, centerAz, centerAlt, fov, cx, cy, radius);
        if (p1 && p2) {
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
          sumX += p1.x + p2.x; sumY += p1.y + p2.y; count += 2;
        }
      }
      // Draw constellation name at centroid
      if (showConNames && count > 0) {
        const cx2 = sumX / count, cy2 = sumY / count;
        if (cx2 > 20 && cx2 < W - 20 && cy2 > 20 && cy2 < H - 20) {
          const label = CON_NAMES[con] || con;
          ctx.fillStyle = 'rgba(70, 100, 150, 0.5)';
          ctx.font = "300 11px 'Outfit', sans-serif";
          ctx.textAlign = 'center';
          ctx.fillText(label, cx2, cy2);
        }
      }
    }
  }

  // Stars
  for (let i = 0; i < STARS.length; i++) {
    const s = STARS[i];
    const aa = starAltAz[i];
    if (aa.alt < -1 || s.mag > magLimit) { starScreenPos.push(null); continue; }

    const p = project(aa.alt, aa.az, centerAz, centerAlt, fov, cx, cy, radius);
    if (!p || p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) {
      starScreenPos.push(null);
      continue;
    }

    starScreenPos.push(p);

    // Size based on magnitude
    const magScale = Math.max(0.3, (5.5 - s.mag) / 5.5);
    const sz = magScale * 1.6 * (120 / fov);
    const alpha = Math.min(1, magScale * 1.2);

    const col = showTemp ? bvToRGB(s.ci) : 'rgb(210,220,235)';

    // Glow for all stars, radius and intensity scale with brightness
    const glowRadius = sz * (4.5 + Math.max(0, (3.0 - s.mag) * 1.0)) * (60 / fov);
    const glowAlpha = alpha * Math.min(0.55, 0.28 + Math.max(0, (3.5 - s.mag)) * 0.05);
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowRadius);
    glow.addColorStop(0, col.replace('rgb', 'rgba').replace(')', `,${glowAlpha})`));
    glow.addColorStop(0.4, col.replace('rgb', 'rgba').replace(')', `,${glowAlpha * 0.4})`));
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(p.x - glowRadius, p.y - glowRadius, glowRadius * 2, glowRadius * 2);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();

    // Diffraction spikes for very bright stars
    if (s.mag < 1.0) {
      ctx.strokeStyle = col.replace('rgb', 'rgba').replace(')', ',0.15)');
      ctx.lineWidth = 0.5;
      const spikeLen = (2.0 - s.mag) * 5 * (120 / fov);
      ctx.beginPath();
      ctx.moveTo(p.x - spikeLen, p.y); ctx.lineTo(p.x + spikeLen, p.y);
      ctx.moveTo(p.x, p.y - spikeLen); ctx.lineTo(p.x, p.y + spikeLen);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;

    // Labels for named stars
    if (showLabels && s.n && s.mag < 3.5) {
      ctx.fillStyle = `rgba(140, 170, 210, ${Math.min(0.7, (3.5 - s.mag) / 3.5)})`;
      ctx.font = `${s.mag < 1 ? 11 : 10}px 'Outfit', sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(s.n, p.x + sz + 4, p.y + 3);
    }
  }

  // Planets
  planetScreenPos = [];
  if (showPlanets) {
    const planets = getPlanetPositions(now);
    for (const p of planets) {
      const aa = raDecToAltAz(p.ra, p.dec, lat, lon, lst);
      if (aa.alt < -1) { planetScreenPos.push(null); continue; }
      const sp = project(aa.alt, aa.az, centerAz, centerAlt, fov, cx, cy, radius);
      if (!sp) { planetScreenPos.push(null); continue; }

      planetScreenPos.push({ ...sp, ...p, alt: aa.alt, az: aa.az });

      const sz = 3 * (120 / fov);

      // Planet glow
      const glow = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, sz * 5);
      glow.addColorStop(0, p.color + '40');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(sp.x - sz * 5, sp.y - sz * 5, sz * 10, sz * 10);

      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sz, 0, Math.PI * 2);
      ctx.fill();

      if (showLabels) {
        ctx.fillStyle = p.color + 'cc';
        ctx.font = "500 11px 'Outfit', sans-serif";
        ctx.textAlign = 'left';
        ctx.fillText(p.name, sp.x + sz + 5, sp.y + 4);
      }
    }
  }

  // Cardinal directions
  drawCardinals(cx, cy, radius, lst);

  // HUD
  updateHUD(now, lst);

  // Schedule next frame
  setTimeout(render, 1000);
}

function drawMilkyWayLayer(lst, cx, cy, radius) {
  if (!milkyWayCanvas) {
    milkyWayCanvas = document.createElement('canvas');
    milkyWayCtx = milkyWayCanvas.getContext('2d');
    milkyStarsCanvas = document.createElement('canvas');
    milkyStarsCtx = milkyStarsCanvas.getContext('2d');
  }

  if (milkyWayCanvas.width !== canvas.width || milkyWayCanvas.height !== canvas.height) {
    milkyWayCanvas.width = canvas.width;
    milkyWayCanvas.height = canvas.height;
    milkyWayCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

    milkyStarsCanvas.width = canvas.width;
    milkyStarsCanvas.height = canvas.height;
    milkyStarsCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

    milkyWayCacheKey = '';
  }

  const key = [
    W, H,
    centerAz.toFixed(2), centerAlt.toFixed(2), fov.toFixed(2),
    lat.toFixed(2), lon.toFixed(2),
    (Math.round(lst * 4) / 4).toFixed(2)
  ].join('|');

  if (key !== milkyWayCacheKey) {
    milkyWayCacheKey = key;
    milkyWayCtx.clearRect(0, 0, W, H);
    milkyStarsCtx.clearRect(0, 0, W, H);

    if (!milkyMicroStars) {
      const seed = { v: 123456789 };
      milkyMicroStars = [];
      const microStarCount = Math.max(120, Math.round(720 * MILKYWAY_TUNING.microStarDensity));
      for (let i = 0; i < microStarCount; i++) {
        const l = seededRand(seed) * 360;
        const b = (seededRand(seed) + seededRand(seed) + seededRand(seed) - 1.5) * 7.5;
        const twinkle = Math.pow(seededRand(seed), 2.2);
        milkyMicroStars.push({ l, b, twinkle });
      }
    }

    const samples = [];
    for (let l = 0; l <= 360; l += 2) {
      const eq = galacticToRaDec(l, 0);
      const aa = raDecToAltAz(eq.ra, eq.dec, lat, lon, lst);
      if (aa.alt < 0) continue;
      const p = project(aa.alt, aa.az, centerAz, centerAlt, fov, cx, cy, radius);
      if (!p) continue;
      samples.push({ x: p.x, y: p.y, l });
    }

    if (samples.length > 1) {
      milkyWayCtx.save();
      milkyWayCtx.strokeStyle = 'rgba(155,190,225,0.26)';
      milkyWayCtx.lineWidth = MILKYWAY_TUNING.baseArcWidth * (120 / fov);
      milkyWayCtx.lineCap = 'round';
      milkyWayCtx.lineJoin = 'round';
      milkyWayCtx.beginPath();
      milkyWayCtx.moveTo(samples[0].x, samples[0].y);
      for (let i = 1; i < samples.length; i++) {
        const dx = Math.abs(samples[i].x - samples[i - 1].x);
        const dy = Math.abs(samples[i].y - samples[i - 1].y);
        if (dx < 180 && dy < 180) {
          milkyWayCtx.lineTo(samples[i].x, samples[i].y);
        } else {
          milkyWayCtx.moveTo(samples[i].x, samples[i].y);
        }
      }
      milkyWayCtx.stroke();
      milkyWayCtx.restore();

      // Procedural cloud texture (cache-only), denser near galactic center
      const sizeScale = (120 / fov);
      for (let i = 0; i < samples.length; i++) {
        const s = samples[i];
        const h1 = hash01(s.l * 0.31 + i * 0.07);
        if (h1 < 0.18) continue;

        const coreDist = galacticCoreDistance(s.l);
        const coreBoost = Math.exp(-(coreDist * coreDist) / (2 * 35 * 35));

        const jitterR = (10 + 38 * h1 + 24 * coreBoost) * sizeScale;
        const jitterA = hash01(s.l * 1.13 + 9.7) * Math.PI * 2;
        const px = s.x + Math.cos(jitterA) * jitterR;
        const py = s.y + Math.sin(jitterA) * jitterR;

        const blobR = (14 + 34 * hash01(s.l * 0.57 + 3.1) + 26 * coreBoost) * sizeScale;
        const alphaBase = 0.016 + 0.026 * hash01(s.l * 0.83 + 5.4) + 0.055 * coreBoost;
        const alpha = alphaBase * MILKYWAY_TUNING.cloudStrength;

        const rg = 145 + Math.round(30 * hash01(s.l * 0.23 + 2.2));
        const gg = 170 + Math.round(30 * hash01(s.l * 0.27 + 4.1));
        const bg = 210 + Math.round(35 * hash01(s.l * 0.29 + 7.9));

        const g = milkyWayCtx.createRadialGradient(px, py, 0, px, py, blobR);
        g.addColorStop(0, `rgba(${rg},${gg},${bg},${alpha.toFixed(3)})`);
        g.addColorStop(0.5, `rgba(${rg},${gg},${bg},${(alpha * 0.45).toFixed(3)})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        milkyWayCtx.fillStyle = g;
        milkyWayCtx.fillRect(px - blobR, py - blobR, blobR * 2, blobR * 2);
      }

      // Subtle dark dust mottling
      if (MILKYWAY_TUNING.dustStrength > 0.001) {
        for (let i = 0; i < samples.length; i += 2) {
          const s = samples[i];
          const n = hash01(s.l * 0.91 + 12.7);
          if (n < 0.58) continue;
          const coreDist = galacticCoreDistance(s.l);
          const coreBoost = Math.exp(-(coreDist * coreDist) / (2 * 42 * 42));
          const r = (10 + 18 * n + 22 * coreBoost) * (120 / fov);
          const a = (0.016 + 0.030 * n + 0.045 * coreBoost) * MILKYWAY_TUNING.dustStrength;
          const g = milkyWayCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
          g.addColorStop(0, `rgba(8,12,18,${a.toFixed(3)})`);
          g.addColorStop(1, 'rgba(0,0,0,0)');
          milkyWayCtx.fillStyle = g;
          milkyWayCtx.fillRect(s.x - r, s.y - r, r * 2, r * 2);
        }
      }
    }

    // Tiny Milky Way microstars (cache-only)
    for (const ms of milkyMicroStars) {
      const eq = galacticToRaDec(ms.l, ms.b);
      const aa = raDecToAltAz(eq.ra, eq.dec, lat, lon, lst);
      if (aa.alt < 0) continue;
      const p = project(aa.alt, aa.az, centerAz, centerAlt, fov, cx, cy, radius);
      if (!p || p.x < -2 || p.x > W + 2 || p.y < -2 || p.y > H + 2) continue;

      const coreDist = galacticCoreDistance(ms.l);
      const coreBoost = Math.exp(-(coreDist * coreDist) / (2 * 38 * 38));
      const starStrength = Math.max(0, MILKYWAY_TUNING.microStarDensity);
      const alpha = (0.045 + 0.050 * starStrength) * (0.80 + 0.20 * ms.twinkle) * (0.90 + 0.10 * coreBoost);
      milkyStarsCtx.fillStyle = `rgba(200,220,255,${Math.min(0.22, alpha).toFixed(3)})`;
      milkyStarsCtx.fillRect(p.x, p.y, 1, 1);
    }
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const blurPx = MILKYWAY_TUNING.baseBlur * (120 / fov);
  ctx.globalAlpha = MILKYWAY_TUNING.baseOpacity;
  ctx.filter = `blur(${blurPx.toFixed(1)}px)`;
  ctx.drawImage(milkyWayCanvas, 0, 0, W, H);
  ctx.filter = 'none';

  const starsAlpha = Math.min(0.85, 0.20 + 0.22 * MILKYWAY_TUNING.microStarDensity);
  ctx.globalAlpha = starsAlpha;
  ctx.drawImage(milkyStarsCanvas, 0, 0, W, H);
  ctx.restore();
}

function drawHorizon(cx, cy, radius, lst) {
  // Draw horizon as a circle at alt=0
  const pts = [];
  for (let az = 0; az < 360; az += 2) {
    const p = project(0, az, centerAz, centerAlt, fov, cx, cy, radius);
    if (p) pts.push(p);
  }

  if (pts.length > 2) {
    ctx.strokeStyle = 'rgba(60, 100, 160, 0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i].x - pts[i - 1].x;
      const dy = pts[i].y - pts[i - 1].y;
      if (Math.abs(dx) < 200 && Math.abs(dy) < 200) {
        ctx.lineTo(pts[i].x, pts[i].y);
      } else {
        ctx.moveTo(pts[i].x, pts[i].y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawGrid(cx, cy, radius, lst) {
  ctx.strokeStyle = 'rgba(50, 90, 140, 0.5)';
  ctx.lineWidth = 0.8;

  // Altitude circles
  for (let alt = 0; alt <= 80; alt += 20) {
    const pts = [];
    for (let az = 0; az < 360; az += 3) {
      const p = project(alt, az, centerAz, centerAlt, fov, cx, cy, radius);
      if (p) pts.push(p);
    }
    if (pts.length > 2) {
      ctx.setLineDash(alt === 0 ? [] : [3, 5]);
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const dx = Math.abs(pts[i].x - pts[i - 1].x);
        const dy = Math.abs(pts[i].y - pts[i - 1].y);
        if (dx < 200 && dy < 200) ctx.lineTo(pts[i].x, pts[i].y);
        else ctx.moveTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();
      // Label the altitude circle
      if (alt > 0) {
        const labelP = project(alt, (centerAz + fov * 0.35) % 360, centerAz, centerAlt, fov, cx, cy, radius);
        if (labelP && labelP.x > 20 && labelP.x < W - 20 && labelP.y > 20 && labelP.y < H - 20) {
          ctx.fillStyle = 'rgba(60, 100, 150, 0.5)';
          ctx.font = "10px 'JetBrains Mono', monospace";
          ctx.textAlign = 'center';
          ctx.fillText(alt + '°', labelP.x, labelP.y - 4);
        }
      }
    }
  }
  ctx.setLineDash([]);

  // Azimuth lines
  ctx.strokeStyle = 'rgba(50, 90, 140, 0.5)';
  for (let az = 0; az < 360; az += 30) {
    const pts = [];
    for (let alt = 0; alt <= 90; alt += 3) {
      const p = project(alt, az, centerAz, centerAlt, fov, cx, cy, radius);
      if (p) pts.push(p);
    }
    if (pts.length > 1) {
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    }
  }
}

function drawCardinals(cx, cy, radius, lst) {
  const dirs = [
    [0, 'N', '#6a9bd1'], [90, 'E', '#556270'], [180, 'S', '#556270'], [270, 'W', '#556270'],
    [45, 'NE', '#3a4a5a'], [135, 'SE', '#3a4a5a'], [225, 'SW', '#3a4a5a'], [315, 'NW', '#3a4a5a']
  ];

  ctx.font = "600 12px 'JetBrains Mono', monospace";
  ctx.textAlign = 'center';

  for (const [az, label, color] of dirs) {
    const p = project(-2, az, centerAz, centerAlt, fov, cx, cy, radius);
    if (p && p.x > 10 && p.x < W - 10 && p.y > 10 && p.y < H - 10) {
      ctx.fillStyle = color;
      ctx.fillText(label, p.x, p.y + 5);
    }
  }
}

function updateHUD(now, lst) {
  const latStr = Math.abs(lat).toFixed(2) + '°' + (lat >= 0 ? 'N' : 'S');
  const lonStr = Math.abs(lon).toFixed(2) + '°' + (lon >= 0 ? 'E' : 'W');
  document.getElementById('hud-location').innerHTML = `<span class="hud-value">${latStr}</span> / <span class="hud-value">${lonStr}</span>`;

  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const dateStr = now.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
  document.getElementById('hud-time').innerHTML = `<span class="hud-value">${dateStr} ${timeStr}</span>`;

  const azStr = centerAz.toFixed(1) + '°';
  const altStr = centerAlt.toFixed(1) + '°';
  document.getElementById('hud-az').innerHTML = `Az <span class="hud-value">${azStr}</span> Alt <span class="hud-value">${altStr}</span>`;
  const visCount = starScreenPos.filter(p => p !== null).length;
  document.getElementById('hud-fov').innerHTML = `FOV <span class="hud-value">${fov.toFixed(0)}°</span> · <span class="hud-value">${visCount} stars</span>`;
}

// ═══════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════
function onMouseDown(e) {
  isDragging = true;
  lastMX = e.clientX;
  lastMY = e.clientY;
}

function onMouseMove(e) {
  mouseX = e.clientX;
  mouseY = e.clientY;

  if (isDragging) {
    const dx = e.clientX - lastMX;
    const dy = e.clientY - lastMY;
    centerAz = (centerAz + dx * 0.3 + 360) % 360;
    centerAlt = Math.max(-5, Math.min(60, centerAlt - dy * 0.3));
    lastMX = e.clientX;
    lastMY = e.clientY;
    render();
  }

  // Tooltip hit test
  updateTooltip(e.clientX, e.clientY);
}

function onMouseUp() { isDragging = false; }

function onWheel(e) {
  e.preventDefault();
  fov = Math.max(20, Math.min(70, fov + e.deltaY * 0.1));
  render();
}

let touchStartDist = 0;
let touchStartFov = 0;

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    isDragging = true;
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    touchStartDist = Math.sqrt(dx * dx + dy * dy);
    touchStartFov = fov;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastMX;
    const dy = e.touches[0].clientY - lastMY;
    centerAz = (centerAz + dx * 0.3 + 360) % 360;
    centerAlt = Math.max(-5, Math.min(50, centerAlt - dy * 0.3));
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
    render();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    fov = Math.max(20, Math.min(70, touchStartFov * (touchStartDist / dist)));
    render();
  }
}

function onTouchEnd(e) { isDragging = false; }

function updateTooltip(mx, my) {
  const tooltip = document.getElementById('tooltip');
  let closest = null, closestDist = 20;

  // Check planets first
  for (const pp of planetScreenPos) {
    if (!pp) continue;
    const d = Math.sqrt((pp.x - mx) ** 2 + (pp.y - my) ** 2);
    if (d < closestDist) {
      closest = { type: 'planet', data: pp };
      closestDist = d;
    }
  }

  // Then stars
  for (let i = 0; i < starScreenPos.length; i++) {
    const sp = starScreenPos[i];
    if (!sp) continue;
    const d = Math.sqrt((sp.x - mx) ** 2 + (sp.y - my) ** 2);
    if (d < closestDist) {
      closest = { type: 'star', data: STARS[i], pos: sp };
      closestDist = d;
    }
  }

  if (closest) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 10) + 'px';

    if (closest.type === 'planet') {
      const p = closest.data;
      document.getElementById('tip-name').textContent = `${p.symbol} ${p.name}`;
      document.getElementById('tip-detail').innerHTML =
        `Alt ${p.alt.toFixed(1)}° Az ${p.az.toFixed(1)}°<br>` +
        `RA ${(p.ra).toFixed(2)}h Dec ${(p.dec).toFixed(1)}°<br>` +
        `Dist ${p.dist.toFixed(2)} AU`;
    } else {
      const s = closest.data;
      const name = s.n || s.bf || `HIP ${s.hip}`;
      const conName = CON_NAMES[s.con] || s.con;
      document.getElementById('tip-name').textContent = name;
      document.getElementById('tip-detail').innerHTML =
        `Mag ${s.mag.toFixed(2)} · ${conName}<br>` +
        `RA ${s.ra.toFixed(3)}h Dec ${s.dec.toFixed(2)}°` +
        (s.bf && s.bf !== name ? `<br>${s.bf}` : '');
    }

    // Keep tooltip on screen
    const rect = tooltip.getBoundingClientRect();
    if (rect.right > W) tooltip.style.left = (mx - rect.width - 10) + 'px';
    if (rect.bottom > H) tooltip.style.top = (my - rect.height - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}
